
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>دليل خدمات مركز شبين الكوم</title>

    <meta
        name="description"
        content="دليل شامل لخدمات قرى مركز شبين الكوم">

    <meta
        name="theme-color"
        content="#1565c0">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">

    <meta
        name="apple-mobile-web-app-title"
        content="دليل شبين">

    <link
        rel="manifest"
        href="./manifest.json">

    <link
        rel="apple-touch-icon"
        href="./icons/icon-192.png">

    <link
        rel="icon"
        type="image/png"
        sizes="192x192"
        href="./icons/icon-192.png">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link
        rel="stylesheet"
        href="./style.css">

</head>

<body>

    <header>

        <div class="container">

            <div class="logo">

                <i
                    class="fa-solid fa-location-dot"
                    aria-hidden="true">
                </i>

                <span>
                    دليل خدمات مركز شبين الكوم
                </span>

            </div>

        </div>

    </header>


    <main>

        <section class="hero">

            <div class="container">

                <h1>
                    كل خدمات مركز شبين الكوم
                </h1>

                <p>
                    اختر قريتك للوصول لكل الخدمات بسهولة
                </p>

                <div class="search-box">

                    <input
                        type="search"
                        id="villageSearch"
                        placeholder="ابحث عن قريتك..."
                        autocomplete="off"
                        aria-label="البحث عن قرية">

                    <button
                        type="button"
                        id="searchButton"
                        aria-label="تنفيذ البحث">

                        <i
                            class="fa-solid fa-magnifying-glass"
                            aria-hidden="true">
                        </i>

                    </button>

                </div>

            </div>

        </section>


        <section class="services">

            <div class="container">

                <h2>
                    اختر القرية
                </h2>

                <div
                    class="service-list"
                    id="villagesContainer"
                    aria-live="polite">
                </div>

            </div>

        </section>

    </main>


    <button
        type="button"
        id="installAppBtn"
        class="install-app-btn"
        aria-label="تثبيت تطبيق دليل شبين"
        hidden>

        <i
            class="fa-solid fa-download"
            aria-hidden="true">
        </i>

        <span>
            تثبيت التطبيق
        </span>

    </button>


    <div
        id="updateNotification"
        class="update-notification"
        role="alert"
        aria-live="assertive"
        hidden>

        <span>
            يوجد تحديث جديد للتطبيق
        </span>

        <button
            type="button"
            id="updateAppBtn">

            تحديث الآن

        </button>

    </div>


    <footer>

        <div class="container">

            <h3>
                دليل خدمات مركز شبين الكوم
            </h3>

            <p>
                كل خدمات القرى في مكان واحد
            </p>

            <p>
                ©
                <span id="year"></span>
                جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>
                    Abdallah Badawy
                </strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>
                    Omar Emad
                </strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>


    <script src="./index.js"></script>

</body>

</html>
