<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل خدمات ميت مسعود</title>
    <meta name="description" content="دليل خدمات قرية ميت مسعود">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="container">

            <div class="logo">
                <i class="fa-solid fa-location-dot"></i>
                <h2>دليل خدمات ميت مسعود</h2>
            </div>

            <nav>
                <a href="index.html">الرئيسية</a>
                <a href="all-services.html">كل الخدمات</a>
                <a href="add-service.html">أضف خدمتك</a>
            </nav>

        </div>
    </header>

    <section class="hero">
        <div class="container">

            <h1>كل خدمات قرية ميت مسعود</h1>

            <p>ابحث عن أي صنايعي أو محل أو طبيب بسهولة.</p>

            <div class="search-box">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="ابحث عن خدمة...">

                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

            </div>

        </div>
    </section>

    <section class="categories">
        <div class="container">

            <h2>الأقسام</h2>

            <div class="cards">

                <div class="card" onclick="filterCategory('كهربائي')">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>كهربائيين</h3>
                </div>

                <div class="card" onclick="filterCategory('سباك')">
                    <i class="fa-solid fa-faucet"></i>
                    <h3>سباكين</h3>
                </div>

                <div class="card" onclick="filterCategory('نجار')">
                    <i class="fa-solid fa-hammer"></i>
                    <h3>نجارين</h3>
                </div>

                <div class="card" onclick="filterCategory('حلاق')">
                    <i class="fa-solid fa-scissors"></i>
                    <h3>حلاقين</h3>
                </div>

                <div class="card" onclick="filterCategory('محل')">
                    <i class="fa-solid fa-store"></i>
                    <h3>محلات</h3>
                </div>

                <div class="card" onclick="filterCategory('طبيب')">
                    <i class="fa-solid fa-user-doctor"></i>
                    <h3>أطباء</h3>
                </div>

            </div>

        </div>
    </section>

    <section class="services">
        <div class="container">

            <h2>أحدث الخدمات</h2>

            <div class="service-list"></div>

        </div>
    </section>

    <footer>
        <div class="container">

            <h3>دليل خدمات ميت مسعود</h3>

            <p>جميع خدمات القرية في مكان واحد.</p>

            <p>© 2026 جميع الحقوق محفوظة.</p>

            <a href="admin-login.html">
                🔐 دخول الإدارة
            </a>

        </div>
    </footer>

    <!-- ملف الجافاسكريبت الرئيسي -->
    <script type="module" src="script.js"></script>

</body>

</html>
