<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>دليل خدمات مركز شبين الكوم</title>

    <meta name="description" content="دليل شامل لخدمات قرى مركز شبين الكوم">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <div class="container">

            <div class="logo">

                <i class="fa-solid fa-location-dot"></i>

                <span>دليل خدمات مركز شبين الكوم</span>

            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="container">

                <h1>
                    كل خدمات مركز شبين الكوم
                </h1>

                <p>
                    اختر قريتك للوصول لكل الخدمات بسهولة
                </p>

                <div class="search-box">

                    <input
                        type="search"
                        id="villageSearch"
                        placeholder="ابحث عن قريتك..."
                        autocomplete="off"
                        aria-label="البحث عن قرية">

                    <button
                        type="button"
                        id="searchButton"
                        aria-label="بحث">

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>

                </div>

            </div>

        </section>

        <section class="services">

            <div class="container">

                <h2>
                    اختر القرية
                </h2>

                <div
                    class="service-list"
                    id="villagesContainer">

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="container">

            <h3>
                دليل خدمات مركز شبين الكوم
            </h3>

            <p>
                كل خدمات القرى في مكان واحد
            </p>

            <p>
                © <span id="year"></span> جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>Abdallah Badawy</strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>Omar Emad</strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <script src="index.js"></script>

</body>

</html>
