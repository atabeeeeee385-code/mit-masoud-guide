<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title id="pageTitle">
        تفاصيل الخدمة
    </title>

    <meta
        name="description"
        content="تفاصيل وبيانات الخدمة في دليل خدمات مركز شبين الكوم"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <div class="container">

            <div class="logo" id="logoTitle">

                <i
                    class="fa-solid fa-location-dot"
                    aria-hidden="true"
                ></i>

                <span>
                    دليل خدمات القرية
                </span>

            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="container">

                <h1>
                    تفاصيل الخدمة
                </h1>

                <p>
                    بيانات مقدم الخدمة وطرق التواصل
                </p>

            </div>

        </section>

        <section class="service-details-section">

            <div class="container">

                <div
                    class="service-card"
                    id="serviceDetails"
                    aria-live="polite"
                >

                    <p>
                        جاري تحميل بيانات الخدمة...
                    </p>

                </div>

                <div class="service-actions">

                    <button
                        type="button"
                        class="share"
                        id="shareServiceButton"
                    >

                        <i
                            class="fa-solid fa-share-nodes"
                            aria-hidden="true"
                        ></i>

                        مشاركة الخدمة

                    </button>

                    <button
                        type="button"
                        class="back-button"
                        id="backButton"
                    >

                        <i
                            class="fa-solid fa-arrow-right"
                            aria-hidden="true"
                        ></i>

                        رجوع

                    </button>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="container">

            <h3 id="footerTitle">
                دليل خدمات القرية
            </h3>

            <p>
                جميع خدمات القرية في مكان واحد
            </p>

            <p>
                © <span id="year"></span>
                جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>
                    Abdallah Badawy
                </strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>
                    Omar Emad
                </strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>

    <script>
        document.getElementById("year").textContent =
            new Date().getFullYear();

        const backButton =
            document.getElementById("backButton");

        backButton.addEventListener("click", function () {
            window.history.back();
        });
    </script>

    <script type="module" src="service.js"></script>

</body>

</html>
