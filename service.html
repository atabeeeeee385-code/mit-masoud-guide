<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title id="pageTitle">
        تفاصيل الخدمة
    </title>

    <meta
        name="description"
        content="تفاصيل وبيانات الخدمة في دليل خدمات مركز شبين الكوم"
    >

    <!-- إعدادات PWA -->

    <meta
        name="theme-color"
        content="#1565c0"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="دليل شبين"
    >

    <link
        rel="manifest"
        href="./manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="./icons/icon-192.png"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="192x192"
        href="./icons/icon-192.png"
    >

    <!-- الخطوط -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

    <!-- ملف التصميم -->

    <link
        rel="stylesheet"
        href="./style.css"
    >

</head>

<body>

    <header>

        <div class="container">

            <div
                class="logo"
                id="logoTitle"
            >

                <i
                    class="fa-solid fa-location-dot"
                    aria-hidden="true"
                ></i>

                <span>
                    دليل خدمات القرية
                </span>

            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="container">

                <h1>
                    تفاصيل الخدمة
                </h1>

                <p>
                    بيانات مقدم الخدمة وطرق التواصل
                </p>

            </div>

        </section>

        <section class="service-details-section">

            <div class="container">

                <div
                    class="service-card"
                    id="serviceDetails"
                    aria-live="polite"
                >

                    <p>
                        جاري تحميل بيانات الخدمة...
                    </p>

                </div>

                <div class="service-actions">

                    <button
                        type="button"
                        class="share"
                        id="shareServiceButton"
                    >

                        <i
                            class="fa-solid fa-share-nodes"
                            aria-hidden="true"
                        ></i>

                        مشاركة الخدمة

                    </button>

                    <button
                        type="button"
                        class="back-button"
                        id="backButton"
                    >

                        <i
                            class="fa-solid fa-arrow-right"
                            aria-hidden="true"
                        ></i>

                        رجوع

                    </button>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="container">

            <h3 id="footerTitle">
                دليل خدمات القرية
            </h3>

            <p>
                جميع خدمات القرية في مكان واحد
            </p>

            <p>
                © <span id="year"></span>
                جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>
                    Abdallah Badawy
                </strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>
                    Omar Emad
                </strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>

    <script>

        const yearElement =
            document.getElementById("year");

        const backButton =
            document.getElementById("backButton");

        if (yearElement) {

            yearElement.textContent =
                new Date().getFullYear();

        }

        if (backButton) {

            backButton.addEventListener(
                "click",
                function () {

                    if (window.history.length > 1) {

                        window.history.back();

                    } else {

                        window.location.href =
                            "./index.html";

                    }

                }
            );

        }

    </script>

    <script
        type="module"
        src="./service.js"
    ></script>

</body>

</html>
