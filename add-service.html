<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>أضف خدمتك</title>

    <meta
        name="description"
        content="أضف خدمتك إلى دليل خدمات قرى مركز شبين الكوم"
    >

    <!-- إعدادات PWA -->

    <meta
        name="theme-color"
        content="#1565c0"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="دليل شبين"
    >

    <link
        rel="manifest"
        href="./manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="./icons/icon-192.png"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="192x192"
        href="./icons/icon-192.png"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="./style.css"
    >

</head>

<body>

    <header>

        <div class="container">

            <div
                class="logo"
                id="logoTitle"
            >
                📍 دليل خدمات القرية
            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="container">

                <h1 id="heroTitle">
                    أضف خدمتك
                </h1>

                <p>
                    سجل بياناتك ليجدك أهل القرية بسهولة
                </p>

            </div>

        </section>

        <section>

            <div class="container">

                <div class="service-card">

                    <form id="serviceForm">

                        <label for="name">
    الاسم
</label>

<input
    type="text"
    id="name"
    name="name"
    placeholder="اكتب اسمك"
    maxlength="100"
    required
>

<label for="village">
    القرية أو المنطقة
</label>

<select
    id="village"
    name="village"
    required>

    <option value="">
        اختر القرية
    </option>

    <option value="شبين الكوم">شبين الكوم</option>
    <option value="إصطباري">إصطباري</option>
    <option value="البتانون">البتانون</option>
    <option value="بخاتي">بخاتي</option>
    <option value="الدلاتون">الدلاتون</option>
    <option value="الراهب">الراهب</option>
    <option value="السكرية">السكرية</option>
    <option value="العسالتة">العسالتة</option>
    <option value="الماي">الماي</option>
    <option value="بتبس">بتبس</option>
    <option value="حصة مليج">حصة مليج</option>
    <option value="دكما">دكما</option>
    <option value="زوير">زوير</option>
    <option value="سلكا">سلكا</option>
    <option value="شبرا باص">شبرا باص</option>
    <option value="شبرا خلفون">شبرا خلفون</option>
    <option value="شنوان">شنوان</option>
    <option value="شنوفة">شنوفة</option>
    <option value="طنبدي">طنبدي</option>
    <option value="كفر البتانون">كفر البتانون</option>
    <option value="كفر الشيخ خليل">كفر الشيخ خليل</option>
    <option value="كفر العجايزة">كفر العجايزة</option>
    <option value="كفر المصيلحة">كفر المصيلحة</option>
    <option value="كفر دقماق">كفر دقماق</option>
    <option value="كفر شنوان">كفر شنوان</option>
    <option value="كفر طنبدي">كفر طنبدي</option>
    <option value="الكوم الأخضر">الكوم الأخضر</option>
    <option value="مليج">مليج</option>
    <option value="المصيلحة">المصيلحة</option>
    <option value="منشأة بخاتي">منشأة بخاتي</option>
    <option value="منشأة الشريكين">منشأة الشريكين</option>
    <option value="منشأة عصام">منشأة عصام</option>
    <option value="منشأة شنوان">منشأة شنوان</option>
    <option value="ميت الموز">ميت الموز</option>
    <option value="ميت خاقان">ميت خاقان</option>
    <option value="ميت خلف">ميت خلف</option>
    <option value="ميت عافية">ميت عافية</option>
    <option value="ميت مسعود">ميت مسعود</option>
    <option value="ميت موسى">ميت موسى</option>

</select>

<label for="category">
    القسم
</label>

<select
    id="category"
    name="category"
    required>

    <option value="">
        اختر القسم
    </option>

                            <option value="health">🏥 الصحة والطوارئ</option>
                            <option value="pharmacy">💊 الصيدليات</option>
                            <option value="education">🎓 التعليم والمدرسين</option>
                            <option value="home">🏠 المنزل والصيانة</option>
                            <option value="construction">🏗️ البناء والتشطيبات</option>
                            <option value="cars">🚗 السيارات والمواصلات</option>
                            <option value="food">🍔 الطعام والديليفري</option>
                            <option value="shipping">📦 الشحن والتوصيل</option>
                            <option value="shops">🛒 المحلات والتجارة</option>
                            <option value="personal">💇 الخدمات الشخصية</option>
                            <option value="charity">❤️ العمل الخيري</option>
                            <option value="agriculture">🌾 الزراعة والبيطرة</option>
                            <option value="technology">💻 التكنولوجيا والصيانة</option>
                            <option value="legal">⚖️ المحاماة والمحاسبة</option>
                            <option value="events">🎉 المناسبات والتصوير</option>
                            <option value="jobs">💼 الوظائف والتدريب</option>
                            <option value="government">🏛️ الخدمات الحكومية</option>
                            <option value="general">⭐ خدمات عامة</option>
                        </select>
                                                <label for="job">
                            المهنة أو الخدمة
                        </label>

                        <input
                            type="text"
                            id="job"
                            name="job"
                            placeholder="مثال: مدرس - صيدلية - كهربائي"
                            maxlength="100"
                            required
                        >

                        <label for="phone">
                            رقم الهاتف
                        </label>

                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="010xxxxxxxx"
                            maxlength="20"
                            required
                        >

                        <label for="whatsapp">
                            رقم الواتساب
                        </label>

                        <input
                            type="tel"
                            id="whatsapp"
                            name="whatsapp"
                            placeholder="010xxxxxxxx أو 2010xxxxxxxx"
                            maxlength="20"
                        >

                        <label for="address">
                            العنوان
                        </label>

                        <input
                            type="text"
                            id="address"
                            name="address"
                            placeholder="اكتب العنوان"
                            maxlength="200"
                        >

                        <label for="description">
                            وصف الخدمة
                        </label>

                        <textarea
                            id="description"
                            name="description"
                            placeholder="اكتب تفاصيل عن خدمتك"
                            rows="5"
                            maxlength="1000"
                        ></textarea>

                        <label for="facebook">
                            رابط صفحة فيسبوك
                        </label>

                        <input
                            type="url"
                            id="facebook"
                            name="facebook"
                            placeholder="https://facebook.com/..."
                        >

                        <label for="instagram">
                            رابط إنستجرام
                        </label>

                        <input
                            type="url"
                            id="instagram"
                            name="instagram"
                            placeholder="https://instagram.com/..."
                        >

                        <label for="tiktok">
                            رابط تيك توك
                        </label>

                        <input
                            type="url"
                            id="tiktok"
                            name="tiktok"
                            placeholder="https://tiktok.com/@..."
                        >

                        <button
                            type="submit"
                            id="submitServiceButton"
                        >
                            إرسال البيانات
                        </button>

                    </form>

                </div>

            </div>

        </section>

    </main>
        <footer>

        <div class="container">

            <h3 id="footerTitle">
                دليل خدمات القرية
            </h3>

            <p>
                جميع خدمات القرية في مكان واحد
            </p>

            <p>
                © <span id="year"></span>
                جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>
                    Abdallah Badawy
                </strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>
                    Omar Emad
                </strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>

    <script>

        const params =
            new URLSearchParams(window.location.search);

        const villageName =
            params.get("village")?.trim() ||
            "ميت مسعود";

        document.title =
            `أضف خدمتك - دليل خدمات ${villageName}`;

        document.getElementById("logoTitle").textContent =
            `📍 دليل خدمات ${villageName}`;

        document.getElementById("heroTitle").textContent =
            `أضف خدمتك في دليل ${villageName}`;

        document.getElementById("footerTitle").textContent =
            `دليل خدمات ${villageName}`;

        document.getElementById("year").textContent =
            new Date().getFullYear();

    </script>

   <script
    type="module"
    src="./script.js?v=11">
</script>

</body>

</html>
