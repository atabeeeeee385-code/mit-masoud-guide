<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">
أضف خدمتك
</title>


<link rel="stylesheet" href="style.css">


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>


<body>



<header>

<div class="container">


<div class="logo" id="logoTitle">

📍 دليل خدمات القرية

</div>


</div>

</header>






<section class="hero">


<div class="container">


<h1 id="heroTitle">

أضف خدمتك

</h1>


<p>

سجل بياناتك ليجدك أهل القرية بسهولة

</p>


</div>


</section>







<section>


<div class="container">


<div class="service-card">



<form id="serviceForm">





<label>
الاسم
</label>


<input 
type="text" 
id="name" 
placeholder="اكتب اسمك"
required>







<label>
القسم
</label>


<select id="category" required>


<option value="">
اختر القسم
</option>


<option value="health">
🏥 الصحة والطوارئ
</option>


<option value="home">
🏠 المنزل والصيانة
</option>


<option value="cars">
🚗 السيارات والمواصلات
</option>


<option value="food">
🍔 الطعام والديليفري
</option>


<option value="shipping">
📦 الشحن والتوصيل
</option>


<option value="shops">
🛒 المحلات والتجارة
</option>


<option value="personal">
💇 خدمات شخصية
</option>


<option value="general">
⭐ خدمات عامة
</option>



</select>







<label>
المهنة أو الخدمة
</label>


<input 
type="text" 
id="job" 
placeholder="مثال: دكتور - كهربائي - سائق"
required>







<label>
رقم الهاتف
</label>


<input 
type="text" 
id="phone" 
placeholder="010xxxxxxxx"
required>







<label>
رقم الواتساب
</label>


<input 
type="text" 
id="whatsapp" 
placeholder="2010xxxxxxxx">







<label>
العنوان
</label>


<input 
type="text" 
id="address" 
placeholder="اكتب العنوان">







<label>
وصف الخدمة
</label>


<textarea 
id="description" 
placeholder="اكتب تفاصيل عن خدمتك"></textarea>







<label>
رابط صفحة فيسبوك
</label>


<input 
type="url" 
id="facebook">







<label>
رابط إنستجرام
</label>


<input 
type="url" 
id="instagram">







<label>
رابط تيك توك
</label>


<input 
type="url" 
id="tiktok">







<button type="submit">

إرسال البيانات

</button>



</form>


</div>


</div>


</section>









<footer>


<div class="container">


<h3 id="footerTitle">

دليل خدمات القرية

</h3>




<p>
جميع خدمات القرية في مكان واحد.
</p>




<p>
© 2026 جميع الحقوق محفوظة.
</p>





<p class="developer">

تم التطوير بواسطة

<br>

<strong>
Abdallah Badawy
</strong>

<br>

💻 Web Developer

</p>




</div>


</footer>









<script>


const params = new URLSearchParams(window.location.search);


const villageName = params.get("village") || "ميت مسعود";




document.title =

"أضف خدمتك - دليل خدمات " + villageName;




document.getElementById("logoTitle").textContent =

"📍 دليل خدمات " + villageName;




document.getElementById("heroTitle").textContent =

"أضف خدمتك في دليل " + villageName;




document.getElementById("footerTitle").textContent =

"دليل خدمات " + villageName;



</script>







<script type="module" src="script.js"></script>


</body>

</html>
