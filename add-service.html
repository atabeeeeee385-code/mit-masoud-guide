
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>أضف خدمتك - دليل خدمات ميت مسعود</title>


    <link rel="stylesheet" href="style.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">


</head>


<body>




<header>


    <div class="container">


        <div class="logo">

            📍 دليل خدمات ميت مسعود

        </div>


    </div>


</header>






<section class="hero">


    <div class="container">


        <h1>
            أضف خدمتك في دليل ميت مسعود
        </h1>



        <p>
            سجل بياناتك ليجدك أهل القرية بسهولة
        </p>



    </div>


</section>






<section>


<div class="container">


<div class="service-card">



<form id="serviceForm">



<label>
الاسم
</label>


<input
type="text"
id="name"
placeholder="اكتب اسمك"
required>





<label>
المهنة
</label>


<input
type="text"
id="job"
placeholder="مثال: فني موتوسيكلات - كهربائي - حلاق"
required>





<label>
رقم الهاتف
</label>


<input
type="text"
id="phone"
placeholder="010xxxxxxxx"
required>





<label>
رقم الواتساب
</label>


<input
type="text"
id="whatsapp"
placeholder="2010xxxxxxxx">





<label>
العنوان
</label>


<input
type="text"
id="address"
placeholder="اكتب العنوان">





<label>
وصف الخدمة
</label>


<textarea
id="description"
placeholder="اكتب تفاصيل عن خدمتك"></textarea>





<label>
رابط صفحة فيسبوك
</label>


<input
type="url"
id="facebook"
placeholder="https://facebook.com/...">





<label>
رابط إنستجرام
</label>


<input
type="url"
id="instagram"
placeholder="https://instagram.com/...">





<label>
رابط تيك توك
</label>


<input
type="url"
id="tiktok"
placeholder="https://tiktok.com/...">





<button type="submit">

إرسال البيانات

</button>



</form>



</div>


</div>


</section>








<footer>


<div class="container">


<h3>
دليل خدمات ميت مسعود
</h3>



<p>
جميع خدمات القرية في مكان واحد.
</p>



<p>
© 2026 جميع الحقوق محفوظة.
</p>




<p class="developer">


تم التطوير بواسطة


<br>


<strong>
Abdallah Badawy
</strong>


<br>


💻 Web Developer



</p>




</div>


</footer>







<script type="module" src="script.js"></script>



</body>


</html>
