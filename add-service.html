<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>أضف خدمتك - دليل خدمات ميت مسعود</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <div class="container">

        <div class="logo">

            📍 دليل خدمات ميت مسعود

        </div>

    </div>

</header>



<section class="hero">

<div class="container">

<h1>
أضف خدمتك في دليل ميت مسعود
</h1>

<p>
سجل بياناتك ليجدك أهل القرية بسهولة
</p>


</div>

</section>



<section>

<div class="container">


<div class="service-card">


<form id="serviceForm">


<label>الاسم</label>

<input type="text" id="name" placeholder="اكتب اسمك" required>



<label>المهنة</label>

<input type="text" id="job" placeholder="مثال: كهربائي" required>



<label>رقم الهاتف</label>

<input type="text" id="phone" placeholder="010xxxxxxxx" required>



<label>العنوان</label>

<input type="text" id="address" placeholder="العنوان">



<label>وصف الخدمة</label>

<textarea id="description"
placeholder="اكتب تفاصيل عن خدمتك"></textarea>



<button type="submit">
إرسال البيانات
</button>


</form>


</div>


</div>

</section>



<script src="script.js"></script>


</body>

</html>
