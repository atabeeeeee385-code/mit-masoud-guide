<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        دخول الإدارة - دليل خدمات مركز شبين الكوم
    </title>

    <meta
        name="description"
        content="تسجيل دخول إدارة دليل خدمات مركز شبين الكوم">

    <!-- إعدادات PWA -->

    <meta
        name="theme-color"
        content="#1565c0">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">

    <meta
        name="apple-mobile-web-app-title"
        content="دليل شبين">

    <link
        rel="manifest"
        href="./manifest.json">

    <link
        rel="apple-touch-icon"
        href="./icons/icon-192.png">

    <link
        rel="icon"
        type="image/png"
        sizes="192x192"
        href="./icons/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="./style.css">

</head>

<body>

    <header>

        <div class="container">

            <div class="logo">
                📍 دخول الإدارة
            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="container">

                <h1>
                    لوحة التحكم
                </h1>

                <p>
                    أدخل بيانات الدخول للمتابعة
                </p>

            </div>

        </section>

        <section>

            <div class="container">

                <div class="service-card">

                    <form id="loginForm">

                        <label for="password">
                            كلمة المرور
                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="اكتب كلمة المرور"
                            autocomplete="current-password"
                            minlength="6"
                            required>

                        <button
                            type="submit"
                            id="loginButton">
                            دخول
                        </button>

                        <p
                            id="loginMessage"
                            aria-live="polite">
                        </p>

                    </form>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="container">

            <h3>
                دليل خدمات مركز شبين الكوم
            </h3>

            <p>
                جميع خدمات القرى في مكان واحد
            </p>

            <p>
                © <span id="year"></span>
                جميع الحقوق محفوظة
            </p>

            <p class="developer">

                تم التطوير بواسطة

                <br><br>

                <strong>
                    Abdallah Badawy
                </strong>

                <br>

                💻 Full Stack Web Developer

                <br><br>

                <strong>
                    Omar Emad
                </strong>

                <br>

                💻 Web Developer

            </p>

        </div>

    </footer>

    <script>

        document.getElementById("year").textContent =
            new Date().getFullYear();

    </script>

    <script
        type="module"
        src="./admin-login.js">
    </script>

</body>

</html>
